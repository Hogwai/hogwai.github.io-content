server:
  port: 8080

spring:
  application:
    name: database-driven-workflow-engine

  datasource:
    url: jdbc:h2:mem:workflow_engine;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        jdbc:
          batch_size: 50
    open-in-view: false

  sql:
    init:
      mode: always
      schema-locations:
        - classpath:schema-h2.sql
        - classpath:schema-batch-h2.sql
      data-locations: classpath:data-h2.sql

  batch:
    jdbc:
      initialize-schema: never
    job:
      enabled: false

springdoc:
  swagger-ui:
    path: /
    disable-swagger-default-url: true
  api-docs:
    path: /api-docs

logging:
  level:
    com.hogwai: INFO
    org.springframework.batch: INFO
