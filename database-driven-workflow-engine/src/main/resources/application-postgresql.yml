spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/workflow_engine
    driver-class-name: org.postgresql.Driver
    username: sa
    password: sa

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 50
    open-in-view: false

  sql:
    init:
      mode: always
      schema-locations:
        - classpath:schema-postgresql.sql
        - classpath:schema-batch-postgresql.sql
      data-locations: classpath:data-postgresql.sql

  batch:
    jdbc:
      initialize-schema: never
    job:
      enabled: false

  h2:
    console:
      enabled: false
